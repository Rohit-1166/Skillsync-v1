# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  A hybrid matching system combining FAISS semantic search (using cached BGE-small embeddings) with 20 recruiter-inspired feature scores (experience stability, skill matching, capability alignment, education quality, platform engagement, and notice periods). Fictional and impossible honeypot profiles are dynamically filtered, and tie-breaks are resolved alphabetically by candidate ID. Matching executes in under 1 second on CPU.

