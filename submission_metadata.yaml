  - "Cursor"

ai_usage_summary: |
  AI tools (specifically Cursor/Claude) were utilized as an iterative pair-programming assistant during development. The human team designed the multi-stage hybrid ranking architecture, the 20 recruiter-inspired feature scoring weights, and the TimelineConsistencyAnalyzer to catch synthetic honeypot resumes. The AI was used for generating unittest boilerplate, optimizing Python loop execution, and debugging environment setup issues (specifically, torchvision dependency conflicts in Google Colab). Also the frontend dashboard(api/static) was generated using AI by user-given prompts.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  A hybrid matching system combining FAISS semantic search (using cached BGE-small embeddings) with 20 recruiter-inspired feature scores (experience stability, skill matching, capability alignment, education quality, platform engagement, and notice periods). Fictional and impossible honeypot profiles are dynamically filtered, and tie-breaks are resolved alphabetically by candidate ID. Matching executes in under 1 second on CPU.

